name: Build APK Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Build APK directly with Gradle
        run: |
          # Create Android project from scratch
          mkdir -p app/src/main/assets
          cp rewire.html app/src/main/assets/index.html
          
          # Create minimal AndroidManifest
          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.rewire.app">
            <application android:usesCleartextTraffic="true">
              <activity android:name="android.app.Activity" android:exported="true">
                <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
              </activity>
            </application>
          </manifest>
          EOF
          
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: Rewire-App
          path: app/build/outputs/apk/
