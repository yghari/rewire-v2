name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
        
      - name: Accept Android SDK licenses
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
      - name: Start local server
        run: |
          python3 -m http.server 8080 &
          sleep 5
          
      - name: Initialize Bubblewrap
        run: |
          echo -e "n\nn" | bubblewrap init \
            --manifest http://localhost:8080/manifest.json \
            --directory twa-project
            
      - name: Build APK
        run: |
          cd twa-project
          echo "" | bubblewrap build
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rewire-App
          path: twa-project/app-release-unsigned.apk
