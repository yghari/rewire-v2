name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install expect
        run: sudo apt-get update && sudo apt-get install -y expect
        
      - name: Prepare web files
        run: |
          mkdir -p webapp
          cp rewire.html webapp/index.html
          
          cat > webapp/manifest.json << 'EOF'
          {
            "name": "Rewire",
            "short_name": "Rewire",
            "start_url": "index.html",
            "display": "standalone",
            "theme_color": "#0b1120",
            "background_color": "#0b1120"
          }
          EOF
          
      - name: Start web server
        run: |
          cd webapp
          python3 -m http.server 8080 &
          cd ..
          sleep 3
          
      - name: Initialize Bubblewrap with expect
        run: |
          expect << 'EOF'
            set timeout 60
            spawn bubblewrap init --manifest http://localhost:8080/manifest.json --directory twa-project
            expect "Do you want Bubblewrap to install the JDK" { send "y\r" }
            expect "Press any key" { send "\r" }
            expect eof
          EOF
          
      - name: Build APK with expect
        run: |
          cd twa-project
          expect << 'EOF'
            set timeout 300
            spawn bubblewrap build
            expect "Press any key" { send "\r" }
            expect eof
          EOF
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rewire-App
          path: twa-project/app-release-unsigned.apk
          if-no-files-found: error
