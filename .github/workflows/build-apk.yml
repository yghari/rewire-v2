name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Accept Android SDK licenses (non-interactive)
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
        
      - name: Prepare web files
        run: |
          mkdir -p webapp
          cp rewire.html webapp/index.html
          
          cat > webapp/manifest.json << 'EOF'
          {
            "name": "Rewire",
            "short_name": "Rewire",
            "start_url": "index.html",
            "display": "standalone",
            "theme_color": "#0b1120",
            "background_color": "#0b1120"
          }
          EOF
          
      - name: Start web server
        run: |
          cd webapp
          python3 -m http.server 8080 > /dev/null 2>&1 &
          cd ..
          sleep 5
          
      - name: Initialize Bubblewrap (auto-answer no to JDK/Android SDK)
        run: |
          echo -e "n\nn" | bubblewrap init \
            --manifest http://localhost:8080/manifest.json \
            --directory twa-project
            
      - name: Build APK (auto-answer prompts)
        run: |
          cd twa-project
          echo "" | bubblewrap build
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rewire-App
          path: |
            twa-project/app-release-unsigned.apk
            twa-project/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
