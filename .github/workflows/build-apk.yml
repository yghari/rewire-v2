name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Bubblewrap only
        run: |
          npm install -g @bubblewrap/cli
          
      - name: Prepare web files
        run: |
          mkdir -p webapp
          cp rewire.html webapp/index.html
          
          # Create manifest
          cat > webapp/manifest.json << 'EOF'
          {
            "name": "Rewire Islamic Companion",
            "short_name": "Rewire",
            "start_url": "index.html",
            "display": "standalone",
            "theme_color": "#0b1120",
            "background_color": "#0b1120",
            "orientation": "portrait"
          }
          EOF
          
      - name: Start simple Python server (no installation needed)
        run: |
          cd webapp
          python3 -m http.server 8080 &
          cd ..
          sleep 3
          
      - name: Initialize Bubblewrap project
        run: |
          bubblewrap init \
            --manifest http://localhost:8080/manifest.json \
            --directory twa-project
            
      - name: Build APK
        run: |
          cd twa-project
          bubblewrap build
          
      - name: Find and upload APK
        run: |
          find twa-project -name "*.apk" -exec cp {} ./Rewire-App.apk \;
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rewire-Android-App
          path: ./Rewire-App.apk
          if-no-files-found: error
