name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Install dependencies
        run: |
          npm install -g @bubblewrap/cli
          npm install -g http-server
          
      - name: Prepare web files
        run: |
          mkdir -p webapp
          cp rewire.html webapp/index.html
          
          # Create manifest
          cat > webapp/manifest.json << 'EOF'
          {
            "name": "Rewire Islamic Companion",
            "short_name": "Rewire",
            "start_url": "index.html",
            "display": "standalone",
            "theme_color": "#0b1120",
            "background_color": "#0b1120",
            "orientation": "portrait"
          }
          EOF
          
      - name: Start web server
        run: |
          cd webapp
          http-server -p 8080 &
          cd ..
          sleep 5
          
      - name: Build APK
        run: |
          bubblewrap init --manifest http://localhost:8080/manifest.json --directory app
          cd app
          bubblewrap build --skipSigning
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rewire-App-APK
          path: app/app-release-unsigned.apk
          compression-level: 0
