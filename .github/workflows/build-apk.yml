name: Build APK with Web2APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Web2APK
        run: |
          npm install -g web2apk
          
      - name: Prepare web files
        run: |
          mkdir -p webapp
          cp index.html webapp/
          
      - name: Build APK
        run: |
          web2apk create \
            --input webapp \
            --output Rewire.apk \
            --name Rewire \
            --package com.rewire.app
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rewire-App
          path: Rewire.apk
