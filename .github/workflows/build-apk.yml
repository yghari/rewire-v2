name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Accept Android SDK licenses (non-interactive)
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Prepare web files
        run: |
          mkdir -p webapp
          cp rewire.html webapp/index.html

          cat > webapp/manifest.json << 'EOF'
          {
            "name": "Rewire",
            "short_name": "Rewire",
            "start_url": "/",
            "display": "standalone",
            "theme_color": "#0b1120",
            "background_color": "#0b1120",
            "icons": [
              {
                "src": "https://via.placeholder.com/512",
                "sizes": "512x512",
                "type": "image/png"
              }
            ]
          }
          EOF

      - name: Start web server
        run: |
          cd webapp
          python3 -m http.server 8080 > /dev/null 2>&1 &
          sleep 5

      - name: Write Bubblewrap config (skip interactive init)
        run: |
          mkdir -p twa-project
          cat > twa-project/twa-manifest.json << 'EOF'
          {
            "packageId": "com.rewire.app",
            "host": "localhost",
            "name": "Rewire",
            "launcherName": "Rewire",
            "display": "standalone",
            "themeColor": "#0b1120",
            "navigationColor": "#0b1120",
            "navigationColorDark": "#0b1120",
            "navigationDividerColor": "#0b1120",
            "navigationDividerColorDark": "#0b1120",
            "backgroundColor": "#0b1120",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://via.placeholder.com/512",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "android.keystore",
              "alias": "android"
            },
            "appVersionCode": 1,
            "appVersionName": "1.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "http://localhost:8080/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "http://localhost:8080/",
            "minSdkVersion": 19,
            "orientation": "default"
          }
          EOF

      - name: Configure Bubblewrap JDK/SDK paths
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF

      - name: Generate Android project (no prompts)
        run: |
          cd twa-project
          bubblewrap update --skipVersionUpgrade

      - name: Build APK (no prompts)
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: android
          BUBBLEWRAP_KEY_PASSWORD: android
        run: |
          cd twa-project
          bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rewire-App
          path: |
            twa-project/app-release-signed.apk
            twa-project/app-release-unsigned.apk
            twa-project/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
