name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java (pre-install to avoid Bubblewrap prompts)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK (pre-install to avoid prompts)
        uses: android-actions/setup-android@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
        
      - name: Prepare web files
        run: |
          mkdir -p webapp
          cp rewire.html webapp/index.html
          
          cat > webapp/manifest.json << 'EOF'
          {
            "name": "Rewire",
            "short_name": "Rewire",
            "start_url": "index.html",
            "display": "standalone",
            "theme_color": "#0b1120",
            "background_color": "#0b1120"
          }
          EOF
          
      - name: Start web server
        run: |
          cd webapp
          python3 -m http.server 8080 &
          cd ..
          sleep 5
          
      - name: Initialize Bubblewrap (auto-answer no to JDK/Android SDK)
        run: |
          printf "n\nn\n" | bubblewrap init \
            --manifest http://localhost:8080/manifest.json \
            --directory twa-project
          
      - name: Build APK
        run: |
          cd twa-project
          printf "\n" | bubblewrap build
          
      - name: Find and upload APK
        run: |
          echo "Looking for APK files..."
          find . -name "*.apk" -type f
          # Copy any found APK to root
          find twa-project -name "*.apk" -exec cp {} ./Rewire.apk \; 2>/dev/null || echo "No APK found yet"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rewire-App
          path: |
            **/*.apk
            twa-project/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
