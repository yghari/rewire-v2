name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install PWA2APK
        run: |
          npm install -g pwa2apk
          
      - name: Create manifest
        run: |
          cat > manifest.json << 'EOF'
          {
            "name": "Rewire",
            "short_name": "Rewire",
            "start_url": "/",
            "display": "standalone",
            "theme_color": "#0b1120",
            "background_color": "#0b1120"
          }
          EOF
          
      - name: Build APK directly from URL
        run: |
          pwa2apk generate \
            --url https://yghari.github.io/rewire-v2/ \
            --name Rewire \
            --package com.rewire.app \
            --output Rewire.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rewire-App
          path: Rewire.apk
