name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "platform-tools"

      - name: Prepare web files
        run: |
          mkdir -p webapp
          cp rewire.html webapp/index.html

      - name: Create TWA Android project
        run: |
          mkdir -p twa-project/app/src/main/res/values
          mkdir -p twa-project/app/src/main/res/xml
          mkdir -p twa-project/app/src/main/java/com/rewire/app

          # ── settings.gradle ──────────────────────────────────────────────
          cat > twa-project/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "Rewire"
          include ':app'
          EOF

          # ── root build.gradle ─────────────────────────────────────────────
          cat > twa-project/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          # ── gradle wrapper properties ─────────────────────────────────────
          mkdir -p twa-project/gradle/wrapper
          cat > twa-project/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # ── app/build.gradle ─────────────────────────────────────────────
          cat > twa-project/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.rewire.app'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.rewire.app'
                  minSdk 19
                  targetSdk 34
                  versionCode 1
                  versionName '1.0.0'
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          # ── AndroidManifest.xml ──────────────────────────────────────────
          cat > twa-project/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="@string/app_name"
                  android:theme="@style/Theme.AppCompat.NoActionBar"
                  android:allowBackup="true">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="@string/app_url" />
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https" android:host="@string/app_host"/>
                      </intent-filter>
                  </activity>
                  <service
                      android:name="com.google.androidbrowserhelper.trusted.DelegationService"
                      android:exported="true"
                      android:enabled="true">
                      <intent-filter>
                          <action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

          # ── strings.xml ──────────────────────────────────────────────────
          cat > twa-project/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Rewire</string>
              <string name="app_url">https://rewire.app</string>
              <string name="app_host">rewire.app</string>
          </resources>
          EOF

          # ── colors.xml ───────────────────────────────────────────────────
          cat > twa-project/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#0b1120</color>
              <color name="colorPrimaryDark">#0b1120</color>
              <color name="colorAccent">#0b1120</color>
          </resources>
          EOF

          # ── gradle wrapper script ────────────────────────────────────────
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar \
            -o twa-project/gradle/wrapper/gradle-wrapper.jar

          curl -sL https://raw.githubusercontent.com/gradle/gradle/master/gradlew \
            -o twa-project/gradlew
          chmod +x twa-project/gradlew

      - name: Build APK
        run: |
          cd twa-project
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rewire-App
          path: twa-project/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
