name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install PWABuilder
        run: npm install -g @pwabuilder/cli
        
      - name: Build Android package
        run: |
          pwabuilder package https://yghari.github.io/rewire-v2/
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rewire-App
          path: .pwabuilder/android/**/*.apk
